name: Node.js Build and Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'website/**'
      - '**/*.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'website/**'
      - '**/*.md'
      - 'bindings/python/**'
      - 'bindings/cpp/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build-and-test-node:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Rust Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: node-build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        working-directory: bindings/node
        run: npm install

      - name: Build
        working-directory: bindings/node
        run: npm run build

      - name: Unit Test
        working-directory: bindings/node
        run: npm run test:unit
