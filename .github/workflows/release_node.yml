# Build the fluss Node.js native bindings for multiple platforms.
# Trigger: push tag only (e.g. v0.2.0).
# Artifacts (*.node) can be downloaded from the workflow run page.
#
# Linux builds use zig as the C linker to target glibc 2.17 for maximum compatibility.

name: Release Node.js

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-name: linux-x64-gnu
            use-zig: true
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: darwin-arm64
            use-zig: false
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install Zig
        if: matrix.use-zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: matrix.use-zig
        run: cargo install cargo-zigbuild --locked

      - name: Rust Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: node-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        working-directory: bindings/node
        run: npm install

      - name: Build native module (Linux, zig targeting glibc 2.17)
        if: matrix.use-zig
        working-directory: bindings/node
        run: |
          cargo zigbuild --release --target x86_64-unknown-linux-gnu.2.17 -p fluss_node
          cp ../../target/x86_64-unknown-linux-gnu/release/libfluss_node.so fluss.linux-x64-gnu.node

      - name: Build native module (macOS)
        if: ${{ !matrix.use-zig }}
        working-directory: bindings/node
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.artifact-name }}
          path: bindings/node/*.node
          if-no-files-found: error

  unit-test:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: bindings/node
        run: npm install

      - name: Download Linux x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: bindings-linux-x64-gnu
          path: bindings/node

      - name: Unit Test
        working-directory: bindings/node
        run: npm run test:unit
